apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-warehouse
  labels:
    app: data-warehouse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-warehouse
  template:
    metadata:
      labels:
        app: data-warehouse
    spec:
      containers:
      - name: data-warehouse
        image: employee-data-warehouse:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb:27017/"
        - name: JSON_NODE_URL
          value: "http://json-node:5001"
        - name: XML_NODE_URL
          value: "http://xml-node:5002"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
