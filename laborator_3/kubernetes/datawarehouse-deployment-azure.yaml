apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-warehouse
  labels:
    app: data-warehouse
    environment: azure
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-warehouse
  template:
    metadata:
      labels:
        app: data-warehouse
    spec:
      containers:
      - name: data-warehouse
        image: employeedwregistry.azurecr.io/data-warehouse:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        # Azure Cosmos DB connection (from secret)
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: cosmosdb-connection
              key: connection-string
        - name: JSON_NODE_URL
          value: "http://json-node:5001"
        - name: XML_NODE_URL
          value: "http://xml-node:5002"
        - name: ENVIRONMENT
          value: "azure"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
