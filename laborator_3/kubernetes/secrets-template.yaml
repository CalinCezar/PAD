# Kubernetes Secret Template for Azure Cosmos DB
# This file shows the structure - actual secrets should be created via kubectl

apiVersion: v1
kind: Secret
metadata:
  name: cosmosdb-connection
  namespace: employee-dw
type: Opaque
stringData:
  # Replace with actual Cosmos DB connection string from Azure
  # Format: mongodb://account-name:key@account-name.mongo.cosmos.azure.com:10255/?ssl=true&replicaSet=globaldb&retrywrites=false&maxIdleTimeMS=120000&appName=@account-name@
  connection-string: "REPLACE_WITH_ACTUAL_CONNECTION_STRING"
---
# To create this secret, use:
# kubectl create secret generic cosmosdb-connection \
#   --from-literal=connection-string="<your-connection-string>" \
#   -n employee-dw
