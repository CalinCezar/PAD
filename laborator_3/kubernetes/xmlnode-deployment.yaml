apiVersion: apps/v1
kind: Deployment
metadata:
  name: xml-node
  labels:
    app: xml-node
spec:
  replicas: 2
  selector:
    matchLabels:
      app: xml-node
  template:
    metadata:
      labels:
        app: xml-node
    spec:
      containers:
      - name: xml-node
        image: employee-xml-node:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5002
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
