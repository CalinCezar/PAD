name: Azure Deployment - Employee Data Warehouse

# CI/CD Pipeline for PAD Laboratory 3
# Automates: Build, Test, Push to ACR, Deploy to AKS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: EmployeeDataWarehouse-RG
  ACR_NAME: employeedwregistry
  AKS_CLUSTER_NAME: employee-dw-aks
  AZURE_REGION: eastus

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build and Test Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Data Warehouse image
        run: |
          docker build -f data_warehouse/Dockerfile -t employee-data-warehouse:${{ github.sha }} .

      - name: Build JSON Node image
        run: |
          docker build -f json_node/Dockerfile -t employee-json-node:${{ github.sha }} .

      - name: Build XML Node image
        run: |
          docker build -f xml_node/Dockerfile -t employee-xml-node:${{ github.sha }} .

      - name: Test containers start successfully
        run: |
          docker run -d --name test-dw -p 5000:5000 \
            -e MONGO_URI=mongodb://localhost:27017/ \
            employee-data-warehouse:${{ github.sha }}
          sleep 5
          docker ps | grep test-dw
          docker stop test-dw

  # Job 2: Push to Azure Container Registry
  push-to-acr:
    name: Push Images to Azure Container Registry
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Data Warehouse
        run: |
          docker build -f data_warehouse/Dockerfile \
            -t ${{ env.ACR_NAME }}.azurecr.io/data-warehouse:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/data-warehouse:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/data-warehouse:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/data-warehouse:latest

      - name: Build and Push JSON Node
        run: |
          docker build -f json_node/Dockerfile \
            -t ${{ env.ACR_NAME }}.azurecr.io/json-node:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/json-node:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/json-node:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/json-node:latest

      - name: Build and Push XML Node
        run: |
          docker build -f xml_node/Dockerfile \
            -t ${{ env.ACR_NAME }}.azurecr.io/xml-node:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/xml-node:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/xml-node:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/xml-node:latest

  # Job 3: Deploy to AKS
  deploy-to-aks:
    name: Deploy to Azure Kubernetes Service
    runs-on: ubuntu-latest
    needs: push-to-acr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Update Kubernetes manifests with new image tags
        run: |
          # Update Data Warehouse deployment
          sed -i "s|image: employee-data-warehouse:latest|image: ${{ env.ACR_NAME }}.azurecr.io/data-warehouse:${{ github.sha }}|g" \
            kubernetes/datawarehouse-deployment.yaml

          # Update JSON Node deployment
          sed -i "s|image: employee-json-node:latest|image: ${{ env.ACR_NAME }}.azurecr.io/json-node:${{ github.sha }}|g" \
            kubernetes/jsonnode-deployment.yaml

          # Update XML Node deployment
          sed -i "s|image: employee-xml-node:latest|image: ${{ env.ACR_NAME }}.azurecr.io/xml-node:${{ github.sha }}|g" \
            kubernetes/xmlnode-deployment.yaml

      - name: Create namespace if not exists
        run: |
          kubectl create namespace employee-dw --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -f kubernetes/ -n employee-dw

      - name: Wait for deployment to complete
        run: |
          kubectl rollout status deployment/data-warehouse -n employee-dw --timeout=300s
          kubectl rollout status deployment/json-node -n employee-dw --timeout=300s
          kubectl rollout status deployment/xml-node -n employee-dw --timeout=300s

      - name: Get service endpoints
        run: |
          echo "=== Deployed Services ==="
          kubectl get services -n employee-dw
          echo ""
          echo "=== Pods Status ==="
          kubectl get pods -n employee-dw

      - name: Run health checks
        run: |
          # Get Data Warehouse external IP
          DW_IP=$(kubectl get service data-warehouse -n employee-dw -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Data Warehouse IP: $DW_IP"

          # Wait for external IP
          sleep 30

          # Health check
          curl -f http://$DW_IP:5000/health || echo "Health check failed"

  # Job 4: Run Integration Tests
  integration-tests:
    name: Run Integration Tests on AKS
    runs-on: ubuntu-latest
    needs: deploy-to-aks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Get service endpoint
        id: get-endpoint
        run: |
          DW_IP=$(kubectl get service data-warehouse -n employee-dw -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "endpoint=http://$DW_IP:5000" >> $GITHUB_OUTPUT

      - name: Run API tests
        env:
          BASE_URL: ${{ steps.get-endpoint.outputs.endpoint }}
        run: |
          python scripts/test_endpoints.py

  # Job 5: Notify on deployment
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-to-aks, integration-tests]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-to-aks.result }}" == "success" ] && [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Environment: Production (Azure AKS)"
            echo "Commit: ${{ github.sha }}"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
